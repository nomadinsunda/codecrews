client:
  url: http://localhost:3000

server:
  url: http://localhost:8080

# AWS 설정
cloud:
  aws:
    s3:
      bucket: noticeboardbucket
      stack.auto: false
    region:
      static: ap-northeast-2
    credentials:
      accessKey: ${AWS_ACCESS_KEY}
      secretKey: ${AWS_SECRET_KEY}

# Spring 설정
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/noticeboard
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${DB_PASSWORD}

  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        # 콘솔에 실행 SQL 출력
        show_sql: true
        # SQL을 보기 좋게 포맷팅
        format_sql: true
        # SQL에 들어가는 파라미터 값(?, ?) 확인
        use_sql_comments: true
  
  # Redis 설정
  data:
    redis:
      port: 6379
      host: localhost
      password: ${REDIS_PASSWORD}
      lettuce:
        shutdown-timeout: 100ms # 기본값은 100ms~수 초 사이인데, 이를 명시적으로 짧게 조절

  # Mail 설정
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # OAuth2 설정
  security:
    oauth2:
      client:
        registration:
          naver:
            authorization-grant-type: authorization_code
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            client-name: naver
            redirect-uri: http://localhost:8080/login/oauth2/code/naver
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email, profile
            redirect-uri: http://localhost:8080/login/oauth2/code/google
        provider:
          naver:
            user-name-attribute: response
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            user-info-uri: https://openapi.naver.com/v1/nid/me
            token-uri: https://nid.naver.com/oauth2.0/token

  kafka:
    bootstrap-servers: localhost:9092
    # [추가] 생산자 설정: 메시지를 보내는 속도를 즉시로 변경
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: 1             # 리더가 받았는지만 확인 (가장 빠름)
      properties:
        linger.ms: 0      # 메시지를 모으지 않고 즉시 전송
#        batch.size: 0     # 배치 크기를 0으로 만들어 즉시 전송 유도

    consumer:
      group-id: noticeboard-chat-group
      auto-offset-reset: latest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.example.noticeboard.meeting.chat.dto"
        spring.json.value.default.type: "com.example.noticeboard.meeting.chat.dto.ChatRequest"
        # [추가] consumer 설정: 데이터가 올 때까지 기다리지 않음
        fetch.min.bytes: 1       # 1바이트만 쌓여도 즉시 가져옴
        fetch.max.wait.ms: 50    # 데이터가 없어도 최대 50ms만 대기
        metadata.max.age.ms: 1000

    listener:
      missing-topics-fatal: false
      # [추가] 리스너 모드 설정
      type: single               # 채팅은 순서가 중요하므로 단일 메시지 처리 권장

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace